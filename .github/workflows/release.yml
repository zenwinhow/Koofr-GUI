name: Publish Windows release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Verify release version
        shell: powershell
        run: |
          $packageVersion = (Get-Content -Raw package.json | ConvertFrom-Json).version
          $tauriVersion = (Get-Content -Raw src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargoVersion = ([regex]::Match((Get-Content -Raw src-tauri/Cargo.toml), '(?m)^version\s*=\s*"([^"]+)"')).Groups[1].Value

          if ([string]::IsNullOrWhiteSpace($cargoVersion) -or $packageVersion -ne $tauriVersion -or $packageVersion -ne $cargoVersion) {
            throw "package.json, src-tauri/tauri.conf.json, and src-tauri/Cargo.toml must use the same version."
          }

          if ($env:GITHUB_REF_NAME -ne "v$packageVersion") {
            throw "The release tag must be v$packageVersion."
          }

      - name: Install frontend dependencies
        run: npm ci

      - name: Run release checks
        run: npm run check

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Koofr GUI v__VERSION__
          releaseBody: See CHANGELOG.md for release notes.
          releaseDraft: false
          prerelease: false
